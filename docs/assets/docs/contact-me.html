<div style="margin:0; padding:20px; font-family: Arial, sans-serif; background-color:#e4eaed; color:#030712;">
  <div style="margin:0 auto; background-color:#e4eaed; color:#030712; border-radius:12px; padding:20px;">

    <h2 style="color:#030712; text-align:center; margin-bottom:20px; font-size:24px; line-height:1.3;">
      New {{ topic }} from {{ name }} via my portfolio
    </h2>

    <p style="margin:8px 0;"><strong>Name:</strong> {{ name }}</p>
    <p style="margin:8px 0;"><strong>Email:</strong> {{ email }}</p>
    <p style="margin:8px 0;"><strong>Subject:</strong> {{ subject }}</p>
    <p style="margin:8px 0;"><strong>Topic:</strong> {{ topic }}</p>

    <p style="margin:8px 0; font-weight:bold;">Message:</p>
    <div
      style="background-color:#98a6b3; padding:15px; border-radius:8px; margin-top:5px; word-break:break-word; color:#030712;">
      {{ message }}
    </div>

  </div>
</div>
